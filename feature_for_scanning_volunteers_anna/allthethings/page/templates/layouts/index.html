<!doctype html>
<html lang="en" class="bg-gray-50 text-gray-900">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Anna's Archive{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            action:  '#4361ee',
            success: '#2a9d8f',
            danger:  '#e63946',
            warning: '#f4a261',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen">
  <header class="border-b border-gray-200 bg-white mb-2">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/" class="font-bold text-lg tracking-tight text-gray-900">Anna's Archive</a>
      <span class="text-gray-300">·</span>
      <span class="text-sm text-gray-500">Scanning volunteers</span>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-4 pb-16">
    {% block body %}{% endblock %}
  </main>
</body>
</html>
